# =============================================================================
# Hackathon 2026 – Docker Compose
# Intégration complète avec le code du groupe (AdminDocs)
#
# Services :
#   - team-backend     : Backend Express (port 4000) – branche frontend
#   - ocr-service      : Pipeline OCR FastAPI + Gemini (port 8000)
#   - airflow-*        : Orchestration (webserver 8080)
#   - minio            : Data Lake S3 (API 9000 / Console 8900)
#   - postgres         : BDD Airflow (port 5432)
#   - anomaly-service  : Mock Anomaly Detector (port 8002)
#   - business-service : Mock CRM + Conformité (port 8003)
# =============================================================================

version: "3.8"

# ---------- variables réutilisables Airflow ----------
x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1-python3.11
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho="
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__WEBSERVER__SECRET_KEY: hackathon2026secretkey
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "False"
    # MinIO
    MINIO_ENDPOINT: minio:9000
    MINIO_ACCESS_KEY: minio_user
    MINIO_SECRET_KEY: minio_password
    MINIO_BUCKET_RAW: raw
    MINIO_BUCKET_CLEAN: clean
    MINIO_BUCKET_CURATED: curated
    # Services du groupe
    OCR_SERVICE_URL: http://ocr-service:8000
    ANOMALY_SERVICE_URL: http://anomaly-service:8002
    BUSINESS_SERVICE_URL: http://business-service:8003
    BACKEND_URL: http://team-backend:4000
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./logs:/opt/airflow/logs
    - ./utils:/opt/airflow/utils
    - ./requirements-airflow.txt:/requirements-airflow.txt
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ========================== FRONTEND REACT (GROUPE) ==========================
  # Source : branche feature/frontend-admindocs (dossier frontend/)
  # React + Vite + Tailwind – servi par nginx sur port 3000
  # nginx proxie /api → team-backend:4000
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      team-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ========================== BACKEND EXPRESS (GROUPE) ==========================
  # Source : branche feature/frontend-admindocs
  # Endpoints :
  #   POST /api/upload         (champ "files", multi-fichiers)
  #   GET  /api/documents
  #   GET  /api/documents/:id
  #   GET  /api/crm/suppliers/:id
  #   GET  /api/compliance/:id
  #   GET  /api/health
  team-backend:
    build:
      context: ./team_backend
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
    volumes:
      - backend_uploads:/app/src/uploads
      - backend_data:/app/src/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ========================== OCR SERVICE (GROUPE) ==========================
  # Source : branche dev/ocr-pipeline
  # FastAPI + Gemini Vision
  # Endpoints :
  #   POST /documents/upload   (champ "files", multi-fichiers)
  #   GET  /documents
  #   GET  /documents/{id}
  #   POST /documents/cross-validate
  #   GET  /stats
  #   GET  /health
  ocr-service:
    build:
      context: ./ocr_pipeline
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      PDF_DPI: 200
    volumes:
      - ocr_storage:/app/storage
      - ocr_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ========================== POSTGRES ==========================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ========================== AIRFLOW INIT ==========================
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --no-cache-dir -r /requirements-airflow.txt &&
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname Hackathon \
          --role Admin \
          --email admin@hackathon.local || true
    restart: "no"

  # ========================== AIRFLOW WEBSERVER ==========================
  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "pip install --no-cache-dir -r /requirements-airflow.txt && airflow webserver"
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ========================== AIRFLOW SCHEDULER ==========================
  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "pip install --no-cache-dir -r /requirements-airflow.txt && airflow scheduler"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ========================== MINIO ==========================
  # Cohérent avec branche 1-featureinit-docker (port 8900 pour console)
  minio:
    image: minio/minio:latest
    command: server /data/minio --console-address ":8900"
    environment:
      MINIO_ROOT_USER: minio_user
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9000:9000"    # API S3
      - "8900:8900"    # Console Web
    volumes:
      - minio_data:/data/minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ========================== MINIO INIT ==========================
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set myminio http://minio:9000 minio_user minio_password &&
        mc mb --ignore-existing myminio/raw &&
        mc mb --ignore-existing myminio/clean &&
        mc mb --ignore-existing myminio/curated &&
        echo "=== Buckets créés : raw, clean, curated ==="
    restart: "no"

  # ========================== MOCK : ANOMALY DETECTOR ==========================
  # En attendant que le groupe implémente le vrai anomaly detector
  anomaly-service:
    build:
      context: ./mocks/anomaly_service
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ========================== MOCK : BUSINESS (CRM + CONFORMITE) ==========================
  # Endpoints supplémentaires pour l'auto-remplissage du pipeline
  # Le vrai CRM/conformité est dans team-backend, ce mock ajoute les
  # endpoints POST que le DAG utilise pour pousser les données transformées
  business-service:
    build:
      context: ./mocks/business_service
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  backend_uploads:
  backend_data:
  ocr_storage:
  ocr_logs:
